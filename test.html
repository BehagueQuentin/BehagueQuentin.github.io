<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensemble de Julia</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
    }

    canvas {
        border: 1px solid #000;
    }
</style>
</head>
<body>
<canvas id="juliaCanvas" width="600" height="600"></canvas>

<script>
    // Fonction pour dessiner l'ensemble de Julia sur le canvas
    function drawJuliaSet(canvas, cReal, cImaginary, maxIterations) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(canvas.width, canvas.height);

        for (let x = 0; x < canvas.width; x++) {
            for (let y = 0; y < canvas.height; y++) {
                // Convertir les coordonnées du canvas en coordonnées complexes
                const real = (x - canvas.width / 2) / (canvas.width / 2);
                const imag = (y - canvas.height / 2) / (canvas.height / 2);

                let zReal = real;
                let zImag = imag;

                let iteration = 0;
                while (iteration < maxIterations) {
                    const zRealTemp = zReal * zReal - zImag * zImag + cReal;
                    zImag = 2 * zReal * zImag + cImaginary;
                    zReal = zRealTemp;

                    if (zReal * zReal + zImag * zImag > 4) {
                        break;
                    }

                    iteration++;
                }
                const pixelIndex = (y * canvas.width + x) * 4;
                if(iteration === maxIterations){
                    imageData.data[pixelIndex] = 0; 
                    imageData.data[pixelIndex + 1] = 0; 
                    imageData.data[pixelIndex + 2] = 0; 
                    imageData.data[pixelIndex + 3] = 255;
                }
                else{
                    const color =  255 - Math.floor(iteration / maxIterations * 255);

                    
                    imageData.data[pixelIndex] = (5*color+10)%256;
                    imageData.data[pixelIndex + 1] = (20*color)%256;
                    imageData.data[pixelIndex + 2] = (2*color+90)%256;
                    imageData.data[pixelIndex + 3] = 255;
                }
                
            }
        }

        ctx.putImageData(imageData, 0, 0);
    }

    // Appel de la fonction pour dessiner l'ensemble de Julia avec les paramètres souhaités
    const canvas = document.getElementById('juliaCanvas');
    const cReal = -0.5;
    const cImaginary = 0.6;
    const maxIterations = 1000;
    drawJuliaSet(canvas, cReal, cImaginary, maxIterations);
</script>
</body>
</html>
